# air hot-reload configuration
# Install: go install github.com/air-verse/air@latest

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "web", "db"]
  delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
